<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Realizzazioni - M.C.M.A Coperture</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>

<body class="bg-white text-gray-900">

<!-- NAVBAR -->
<nav class="flex justify-between items-center px-6 md:px-8 py-5 border-b bg-white fixed top-0 w-full z-50">
  <a href="index.html">
    <img src="logo.jpg" class="h-14 md:h-16">
  </a>

  <div class="hidden md:flex space-x-6 text-sm text-gray-600">
    <a href="servizi.html">Servizi</a>
    <a href="realizzazioni.html" class="text-black font-semibold">Realizzazioni</a>
    <a href="index.html">Chi siamo</a>
    <a href="contatti.html">Contatti</a>
  </div>
</nav>

<!-- HERO -->
<section class="relative flex items-center justify-center text-center py-32 px-4 text-white mt-20 overflow-hidden">

  <div class="absolute inset-0">
    <img src="https://res.cloudinary.com/dxyh7igzt/image/upload/v1775478340/seriate_9_xt5olt.jpg" class="w-full h-full object-cover">
    <div class="absolute inset-0 bg-orange-600 opacity-70"></div>
  </div>

  <div class="relative z-10 max-w-6xl mx-auto">

    <h1 class="text-4xl md:text-6xl font-bold mb-6">
      Realizzazioni
    </h1>

    <p class="text-lg mb-6">
      La Nostra Gallery
    </p>

    <!-- FILTRO -->
    <div class="flex flex-wrap justify-center gap-4 mb-12">

      <button onclick="filterCards('all', this)" 
        class="filter-btn bg-white text-black font-semibold px-5 py-2 rounded-full shadow">
        Tutto
      </button>

      <button onclick="filterCards('carpenteria', this)" 
        class="filter-btn border border-white px-5 py-2 rounded-full hover:bg-white hover:text-black">
        Carpenteria metallica
      </button>

      <button onclick="filterCards('coperture', this)" 
        class="filter-btn border border-white px-5 py-2 rounded-full hover:bg-white hover:text-black">
        Coperture e lattoneria
      </button>

      <button onclick="filterCards('progettazione', this)" 
        class="filter-btn border border-white px-5 py-2 rounded-full hover:bg-white hover:text-black">
        Progettazione e posa
      </button>

    </div>

  </div>
</section>

<!-- GRID -->
<section class="px-4 md:px-6 pb-20">
<div class="max-w-6xl mx-auto grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-10">

<!-- CARD COPERTURE -->
<div class="card bg-white rounded-2xl shadow-md overflow-hidden flex flex-col" data-category="coperture">
  <img src="https://res.cloudinary.com/dxyh7igzt/image/upload/v1775478410/gorgonzola_14_x8if4q.jpg" class="h-56 object-cover">
  <div class="p-5 flex flex-col flex-grow">
    <h2 class="font-semibold">Gorgonzola</h2>
    <button onclick="toggleGallery('gallery1')" class="mt-auto bg-black text-white px-4 py-2 rounded-full">
      Vedi lavori
    </button>
  </div>
  <div id="gallery1" class="hidden p-5 grid grid-cols-2 gap-4">
    <img src="https://res.cloudinary.com/dxyh7igzt/image/upload/v1775478410/gorgonzola_14_x8if4q.jpg" onclick="openModal(this.src)">
  </div>
</div>

<!-- CARD CARPENTERIA -->
<div class="card bg-white rounded-2xl shadow-md overflow-hidden flex flex-col" data-category="carpenteria">
  <img src="https://res.cloudinary.com/dxyh7igzt/image/upload/v1775479847/vergiate_5_xwqo2h.jpg" class="h-56 object-cover">
  <div class="p-5 flex flex-col flex-grow">
    <h2 class="font-semibold">Vergiate</h2>
    <button onclick="toggleGallery('gallery2')" class="mt-auto bg-black text-white px-4 py-2 rounded-full">
      Vedi lavori
    </button>
  </div>
  <div id="gallery2" class="hidden p-5 grid grid-cols-2 gap-4">
    <img src="https://res.cloudinary.com/dxyh7igzt/image/upload/v1775479847/vergiate_5_xwqo2h.jpg" onclick="openModal(this.src)">
  </div>
</div>

<!-- CARD PROGETTAZIONE -->
<div class="card bg-white rounded-2xl shadow-md overflow-hidden flex flex-col" data-category="progettazione">
  <img src="https://res.cloudinary.com/dxyh7igzt/image/upload/v1775479574/duomo_6_n4nzyt.jpg" class="h-56 object-cover">
  <div class="p-5 flex flex-col flex-grow">
    <h2 class="font-semibold">Milano</h2>
    <button onclick="toggleGallery('gallery3')" class="mt-auto bg-black text-white px-4 py-2 rounded-full">
      Vedi lavori
    </button>
  </div>
  <div id="gallery3" class="hidden p-5 grid grid-cols-2 gap-4">
    <img src="https://res.cloudinary.com/dxyh7igzt/image/upload/v1775479574/duomo_6_n4nzyt.jpg" onclick="openModal(this.src)">
  </div>
</div>

</div>
</section>

<!-- MODAL -->
<div id="modal" class="fixed inset-0 bg-black bg-opacity-80 hidden items-center justify-center z-50" onclick="closeModal()">
  <img id="modalImg" class="max-w-4xl max-h-[90vh] rounded-lg">
</div>

<!-- FOOTER -->
<footer class="py-10 text-center text-sm text-gray-500 border-t">
  <p>© 2026 M.C.M.A Coperture</p>
</footer>

<script>
function filterCards(category, btn) {
  const cards = document.querySelectorAll(".card");

  cards.forEach(card => {
    const cat = card.getAttribute("data-category");
    card.style.display = (category === "all" || cat === category) ? "flex" : "none";
  });

  document.querySelectorAll(".filter-btn").forEach(b => {
    b.classList.remove("bg-white", "text-black", "font-semibold");
    b.classList.add("border", "border-white", "text-white");
  });

  btn.classList.add("bg-white", "text-black", "font-semibold");
}

function toggleGallery(id) {
  document.querySelectorAll('[id^="gallery"]').forEach(el => {
    if (el.id !== id) el.classList.add("hidden");
  });
  document.getElementById(id).classList.toggle("hidden");
}

function openModal(src) {
  document.getElementById("modal").classList.remove("hidden");
  document.getElementById("modal").classList.add("flex");
  document.getElementById("modalImg").src = src;
}

function closeModal() {
  document.getElementById("modal").classList.add("hidden");
  document.getElementById("modal").classList.remove("flex");
}
</script>

</body>
</html>
